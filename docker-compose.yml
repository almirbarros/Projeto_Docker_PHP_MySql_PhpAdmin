services:
  web:
    image: webdevops/php-apache:8.4-alpine
    container_name: php-app
    restart: always
    ports:
      - "4550:80"
    volumes:
      # Trocar /app para /var/www/html que é o padrão do Apache se precisar
      - /data/projeto/php:/app
    networks:
      - app-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Senha123
      MYSQL_DATABASE: projetodb
    ports:
      - "3306:3306"
    volumes:
      - /data/projeto/mysql:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma-gui
    restart: always
    ports:
      - "8080:80"
    volumes:
      - /data/projeto/php/admin/uploads.ini:/usr/local/etc/php/conf.d/php-phpmyadmin.ini
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    networks:
      - app-network
    depends_on:
      - db

networks:
  app-network:
    driver: bridge
